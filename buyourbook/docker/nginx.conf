# Configuration Nginx spécifique BuyOurBook
# Ajouté dans /etc/nginx/site-opts.d/ (serversideup/php image)

# Taille max d'upload (images de livres)
client_max_body_size 25M;

# Cache des assets statiques buildés par Vite
location /build/ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# Cache des fichiers statiques classiques
location ~* \.(ico|css|js|gif|jpeg|jpg|png|webp|woff2?|ttf|svg)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public";
    try_files $uri =404;
}

# Bloquer l'accès aux fichiers sensibles
location ~ /\.(?!well-known) {
    deny all;
}
